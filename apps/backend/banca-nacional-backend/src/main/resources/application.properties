# ===================================================
# Banca Nacional - Backend Spring Boot 3 / Java 21
# ===================================================

server.port=8080
spring.application.name=banca-backend

# --- DataSource MySQL 5.7 ---
spring.datasource.url=jdbc:mysql://localhost:3306/banca_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=banca_user
spring.datasource.password=banca_pass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JWT ---
app.jwt.secret=BancaNacionalSecretKey2024SuperSeguroParaJWT256BitsMinimo!!ClaveSecreta
app.jwt.expiration-ms=1800000

# --- CORS (Angular dev) ---
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima

# --- Logging ---
logging.level.com.banca=INFO
logging.level.org.springframework.security=WARN
