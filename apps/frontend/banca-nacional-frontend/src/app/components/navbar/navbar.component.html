<header class="navbar" (click)="$event.stopPropagation()">
  <div class="navbar-brand">
    <svg viewBox="0 0 40 40" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="8" fill="#1a3a6b"/>
      <path d="M6 28 L20 8 L34 28 Z" fill="#c8a84b" opacity="0.9"/>
      <rect x="9" y="28" width="22" height="3" rx="1" fill="#c8a84b"/>
      <rect x="15" y="20" width="3" height="8" fill="#1a3a6b"/>
      <rect x="22" y="20" width="3" height="8" fill="#1a3a6b"/>
    </svg>
    <span class="navbar-title">Banco Nacional</span>
  </div>

  <nav class="navbar-menu">
    <a routerLink="/home" routerLinkActive="active" class="nav-link" (click)="closeAll()">🏠 Inicio</a>

    <div class="nav-dropdown" [class.open]="openMenu === 'saldos'">
      <button class="nav-link dropdown-toggle" (click)="toggle('saldos')">💰 Consulta de Saldos ▾</button>
      <div class="dropdown-menu">
        <a routerLink="/consulta/saldos" class="dropdown-item" (click)="closeAll()">📊 Ver todas las cuentas</a>
        <a routerLink="/consulta/saldos-filtrado" class="dropdown-item" (click)="closeAll()">🔍 Consulta filtrada</a>
      </div>
    </div>

    <div class="nav-dropdown" [class.open]="openMenu === 'transferencias'">
      <button class="nav-link dropdown-toggle" (click)="toggle('transferencias')">💸 Transferencias ▾</button>
      <div class="dropdown-menu">
        <a routerLink="/transferencia/propia" class="dropdown-item" (click)="closeAll()">🔄 Entre mis cuentas</a>
        <a routerLink="/transferencia/mismo-banco" class="dropdown-item" (click)="closeAll()">🏦 Mismo banco</a>
        <a routerLink="/transferencia/otro-banco" class="dropdown-item" (click)="closeAll()">🌐 Otro banco (CCI)</a>
      </div>
    </div>
  </nav>

  <div class="navbar-user">
    <div class="nav-dropdown user-dropdown" [class.open]="openMenu === 'user'">
      <button class="nav-link dropdown-toggle user-toggle" (click)="toggle('user')">
        <span class="user-avatar">{{ iniciales }}</span>
        <span class="user-name">{{ auth.user()?.nombres }} {{ auth.user()?.apellidos }}</span>
        <span class="dropdown-arrow">▾</span>
      </button>
      <div class="dropdown-menu user-menu">
        <div class="user-menu-header">
          <div class="user-menu-name">{{ auth.user()?.nombres }} {{ auth.user()?.apellidos }}</div>
          <div class="user-menu-username">&#64;{{ auth.user()?.username }}</div>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item logout-item" (click)="logout()">🚪 Cerrar Sesión</button>
      </div>
    </div>
  </div>
</header>
